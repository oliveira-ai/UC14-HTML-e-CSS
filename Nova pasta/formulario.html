<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <label for="nome">NOME:</label>
    <input type="text" placeholder="Nome completo">

<br>

     <label for="email">Email:</label>
<input type="email" placeholder="Digite seu email">

<br>

<label for="Senha">SENHA:</label>
<input type="password" name="" placeholder="Digite sua senha">

<br>

<label for="data">Data:</label>
<input type="date" name="Data:" >

<br>

<label for="numero">Idade:</label>
<input type="number" name="numero" min="0" max="120">

<br>

<label for="cor">Cor:</label>
<input type="color" name="cor">

<br>

<label for="sexo">SEXO:</label>
<input type="radio" name="sexo" value="masculino">Masculino
<input type="radio" name="sexo" value="feminino">Feminino

<br>

<label for="hobbies">Hobbies:</label>
<input type="checkbox" name="hobbies" value="series">Series
<input type="checkbox" name="hobbies" value="jogos">Jogos
<input type="checkbox" name="hobbies" value="volei">Volei

<br>

<label for="arquivo">Arquivo:</label>
<input type="file" name="ARQUIVO:"">

</body>
</html>

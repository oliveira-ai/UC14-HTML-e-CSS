<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mente.css">
    <title>Blue Focus</title>
</head>
<body>

  <div class="card">

    <img src="images 02.jpg" alt="Música para estudo">

    <div class="conteudo">

      <h1 class="titulo">
        Blue Focus
      </h1>

      <p class="descricao">
        Relaxe, estude e encontre sua melhor versão.
        O Blue Focus combina músicas lo-fi, sons suaves
        e playlists relaxantes para transformar seus
        estudos em um momento mais leve e produtivo.
      </p>

      <div class="botoes">

        <button class="botao ouvir">
          Ouvir Agora
        </button>

        <button class="botao playlist">
          Explorar Playlists
        </button>

      </div>

    </div>

  </div>
